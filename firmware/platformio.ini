; Soundings — LoRa field-node firmware. One binary, declared sensors (DEC-002).
;
; Layout (CLAUDE.md "Architecture"):
;   src/core   — platform-independent logic, host-testable (sensor math, packet
;                (de)serialization, the run cycle). Compiled into esp32 AND native.
;   src/esp32  — board-specific entry + drivers for the Heltec WiFi LoRa 32 V3.
;   test/      — native unit tests (Unity), the load-bearing tier.
;
; Phase 1.1 skeleton — D5 resolved to PlatformIO (mirrors tinkle). lib_deps for the
; SX1262 radio and the sensor drivers get pinned as those layers come online.

[platformio]
default_envs = node

; The real field node: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262). WiFi off, deep
; sleep — that run cycle lands in Phase 2; this env exists now to prove src/core
; links clean under arduino-esp32.
[env:node]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
build_src_filter = +<esp32/> +<core/>
build_flags = -I src/core    ; src/esp32 includes core headers by bare name

; Host test tier. src/core compiles under the SAME language standard as the firmware
; so code that's illegal on-target can't sneak through `pio test`. arduino-esp32 has
; historically pinned an older C++ standard than the host GCC default; gnu++11 is the
; conservative subset (legal here => legal on-target). Revisit if the node env's
; toolchain standard is confirmed newer.
[env:native]
platform = native
build_src_filter = +<core/>
build_flags = -std=gnu++11 -I src/core
test_framework = unity
test_build_src = yes        ; link src/core into the test binary
