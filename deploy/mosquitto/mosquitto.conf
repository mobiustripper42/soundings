# Mosquitto config for the Soundings sim broker.
# Anonymous access is fine on a laptop sim; the real deployment locks this down
# (auth + per-node ACLs) when the gateway/ingestion work lands (D9 topic design).

listener 1883
protocol mqtt

# Debug-only: MQTT-over-WebSockets for browser debug tools. The gateway uses the
# plain MQTT listener on 1883 exclusively — nothing in the stack consumes 9001.
listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
