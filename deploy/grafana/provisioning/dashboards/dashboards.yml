# Grafana dashboard provider — loads any dashboard JSON dropped in
# /var/lib/grafana/dashboards (mounted from deploy/grafana/dashboards).

apiVersion: 1

providers:
  - name: soundings-sim
    orgId: 1
    folder: "Soundings (sim)"
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
