# Grafana dashboard provider — loads any dashboard JSON dropped in
# /var/lib/grafana/dashboards (mounted from deploy/grafana/dashboards).

apiVersion: 1

providers:
  - name: soundings-sim
    orgId: 1
    folder: "Soundings (sim)"
    type: file
    # Provisioned JSON in deploy/grafana/dashboards/ is the source of truth, so
    # block UI deletion. UI edits live only in the named volume and are NOT written
    # back to the repo — to keep a change, export the dashboard JSON and commit it.
    disableDeletion: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
